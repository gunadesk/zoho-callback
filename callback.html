<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoho Auth — Figma Plugin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: #f4f4f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 8px; }
    p  { font-size: 14px; color: #666; line-height: 1.6; }
    .code-box {
      margin: 20px 0;
      background: #f7f7f7;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      color: #333;
    }
    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 24px;
      background: #E8562A;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #c94520; }
    .error { color: #c0392b; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">⏳</div>
    <h1>Completing Authorization…</h1>
    <p>Please wait while we connect to your Figma plugin.</p>
  </div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const code    = params.get('code');
    const state   = params.get('state');
    const error   = params.get('error');
    const card    = document.getElementById('card');

    if (error) {
      card.innerHTML = `
        <div class="icon">❌</div>
        <h1 class="error">Authorization Denied</h1>
        <p>${error}<br>Close this tab and try again in the Figma plugin.</p>`;
    } else if (code) {
      // Send the code back to the plugin window that opened this popup
      let sent = false;
      if (window.opener) {
        try {
          window.opener.postMessage({ type: 'zoho-auth-code', code, state }, '*');
          sent = true;
        } catch (e) {}
      }

      if (sent) {
        card.innerHTML = `
          <div class="icon">✅</div>
          <h1>Authorization Successful!</h1>
          <p>Zoho has been connected to your Figma plugin.<br>You can <strong>close this tab</strong> now.</p>`;
        setTimeout(() => window.close(), 2000);
      } else {
        // Fallback: show the code for manual paste
        card.innerHTML = `
          <div class="icon">🔑</div>
          <h1>Almost there!</h1>
          <p>Copy this authorization code and paste it into the Figma plugin:</p>
          <div class="code-box" id="codeBox">${code}</div>
          <button class="btn" onclick="copyCode()">Copy Code</button>`;
      }
    } else {
      card.innerHTML = `
        <div class="icon">❓</div>
        <h1>Nothing to process</h1>
        <p>This page is the OAuth callback for the Figma Zoho Sheet plugin.<br>
           Start the flow from inside the Figma plugin.</p>`;
    }

    function copyCode() {
      const box = document.getElementById('codeBox');
      navigator.clipboard.writeText(box.textContent || '').then(() => {
        document.querySelector('.btn').textContent = '✓ Copied!';
      });
    }
  </script>
</body>
</html>
